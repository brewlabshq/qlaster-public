name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      # Linux is the production target and the required gate. macOS is a
      # development target: build + test confirm the self-pipe wakeup (tokio
      # AsyncFd over kqueue), SCM_RIGHTS fd passing, mmap(MAP_SHARED) coherency,
      # and SO_NOSIGPIPE behavior actually work on Darwin.
      - name: Test
        run: cargo test --all-targets
